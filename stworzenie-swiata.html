	<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
		<button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
		<button class="lightbox-nav lightbox-prev" onclick="navLightbox(event, -1)">&#8249;</button>
		<img src="" alt="" id="lightbox-img">
		<button class="lightbox-nav lightbox-next" onclick="navLightbox(event, 1)">&#8250;</button>
	</div>

	<script>
	var lbItems, lbIdx;
	function openLightbox(el) {
		lbItems = Array.from(document.querySelectorAll('.gallery-item img'));
		lbIdx = lbItems.indexOf(el.querySelector('img'));
		showLightboxImage();
		document.getElementById('lightbox').classList.add('active');
	}
	function closeLightbox(e) {
		if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
			document.getElementById('lightbox').classList.remove('active');
		}
	}
	function navLightbox(e, dir) {
		e.stopPropagation();
		lbIdx = (lbIdx + dir + lbItems.length) % lbItems.length;
		showLightboxImage();
	}
	function showLightboxImage() {
		var img = lbItems[lbIdx];
		document.getElementById('lightbox-img').src = img.src;
		document.getElementById('lightbox-img').alt = img.alt;
	}
	document.addEventListener('keydown', function(e) {
		if (!document.getElementById('lightbox').classList.contains('active')) return;
		if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
		if (e.key === 'ArrowLeft') { lbIdx = (lbIdx - 1 + lbItems.length) % lbItems.length; showLightboxImage(); }
		if (e.key === 'ArrowRight') { lbIdx = (lbIdx + 1) % lbItems.length; showLightboxImage(); }
	});
	</script>
