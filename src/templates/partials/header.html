	<header class="site-header" id="site-header">
		<div class="wrapper">
			<a class="site-title" href="{{homeUrl}}"><span class="site-title-full">{{author}}</span><span class="site-title-mobile">{{mobileBrand}}</span></a>
			<div class="header-controls">
				<div class="lang-selector lang-selector--header">
{{langSelectorLinks}}
				</div>
				<span class="header-divider" aria-hidden="true">|</span>
				<div class="lang-mobile-dropdown" id="lang-mobile-dropdown">
					<button class="lang-mobile-trigger" type="button" onclick="toggleLangMenu()" aria-label="{{languageMenuLabel}}">
						<span>{{languageMenuLabel}}</span>
					</button>
					<div class="lang-mobile-menu">
{{langDropdownLinks}}
					</div>
				</div>
				<span class="header-divider-mobile" aria-hidden="true">|</span>
				<nav class="site-nav" id="site-nav">
					<button class="nav-trigger" onclick="toggleMenu()" aria-label="{{menuButton}}">
						<span class="hamburger" id="hamburger">
							<span></span><span></span><span></span>
						</span>
						<span class="nav-label">{{menuButton}}</span>
					</button>
					<div class="dropdown">
{{navLinks}}
					</div>
				</nav>
			</div>
		</div>
	</header>
