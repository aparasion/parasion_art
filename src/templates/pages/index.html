<!DOCTYPE html>
<html lang="{{lang}}">
<head>
{{> head}}
{{> nav-script}}
{{> lang-redirect}}
</head>
<body>

	<div class="scroll-sentinel"></div>

{{> header}}

	<main class="page-content">

		<section class="about fade-in">
			<div class="wrapper">
				<div class="about-grid">
					<div class="about-portrait">
						<img src="/img/bpr.png" alt="{{heroAlt}}" width="240" height="240">
					</div>
						<div class="about-text">
							<p class="bio">{{bio}}</p>
						</div>
					</div>
			</div>
		</section>

		<section class="featured fade-in" id="gallery">
			<div class="wrapper">
				<div class="gallery-grid">
{{galleryCards}}
				</div>
			</div>
		</section>

	</main>

{{> footer}}

	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "Artist",
		"name": "{{author}}",
		"url": "{{domain}}",
		"image": "{{domain}}/img/bpr.png",
		"description": "{{jsonLdDescription}}",
		"sameAs": ["{{facebook}}"]
	}
	</script>

{{> scroll-effects}}

</body>
</html>
