<!DOCTYPE html>
<html lang="{{lang}}">
<head>
	<script async data-id="{{clicky_id}}" src="//static.getclicky.com/js"></script>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{title}}</title>
	<meta name="description" content="{{description}}">
	<meta property="og:title" content="{{title}}">
	<meta property="og:description" content="{{ogDescription}}">
	<meta property="og:image" content="https://parasion.art/img/bpr.png">
	<meta property="og:url" content="{{ogUrl}}">
	<meta property="og:type" content="website">
{{hreflangTags}}
	<link rel="stylesheet" href="/css/main.css">
	<link rel="icon" href="/img/favicon.png" type="image/png">
	<script>
	function toggleMenu() {
		document.querySelector('.site-nav').classList.toggle('open');
	}
	</script>
	<script>
	(function() {
		var path = window.location.pathname;
		var isHomepage = (path === '/' || path === '/index.html' ||
			path === '/en/' || path === '/en/index.html' ||
			path === '/de/' || path === '/de/index.html' ||
			path === '/es/' || path === '/es/index.html');
		if (!isHomepage) return;
		if (/bot|crawl|spider|slurp|googlebot|bingbot|yandex/i.test(navigator.userAgent)) return;
		if (localStorage.getItem('parasion_lang_chosen')) return;
		var prefix = (navigator.language || navigator.userLanguage || '').toLowerCase().split('-')[0];
		var langMap = { pl: '/', en: '/en/', de: '/de/', es: '/es/' };
		var target = langMap[prefix] || '/en/';
		var current;
		if (path === '/' || path === '/index.html') current = '/';
		else if (path.indexOf('/en/') === 0) current = '/en/';
		else if (path.indexOf('/de/') === 0) current = '/de/';
		else if (path.indexOf('/es/') === 0) current = '/es/';
		else current = '/';
		if (target !== current) window.location.replace(target);
	})();
	</script>
</head>
<body>

	<header class="site-header">
		<div class="wrapper">
			<a class="site-title" href="{{homeUrl}}">Bolesław Parasion</a>
			<nav class="site-nav">
				<button class="nav-trigger" onclick="toggleMenu()">{{galleryButton}} <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l4 4 4-4"/></svg></button>
				<div class="dropdown">
{{navLinks}}
				</div>
			</nav>
		</div>
	</header>

	<main class="page-content">
		<div class="wrapper">

			<section class="hero">
				<img class="hero-portrait" src="/img/bpr.png" alt="{{heroAlt}}" width="160" height="160">

				<div class="lang-selector">
{{langSelectorLinks}}
				</div>

				<div class="contact-row">
					<span id="email"></span>
					<script>
					var u = "boleslaw", d = "parasion.art";
					document.getElementById('email').innerHTML = '<a href="mailto:' + u + '@' + d + '">' + u + '@' + d + '</a>';
					</script>
					<span class="contact-divider">|</span>
					<span>&#43;&#52;&#56;&nbsp;&#54;&#54;&#53;&nbsp;&#57;&#55;&#51;&nbsp;&#50;&#50;&#51;</span>
					<span class="contact-divider">|</span>
					<a href="{{facebook}}" class="social-link" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook</a>
				</div>
			</section>

			<p class="bio">{{bio}}</p>

		</div>
	</main>

	<footer class="site-footer">
		<div class="wrapper">
			Copyright &copy; <span id="year"></span> <a href="{{homeUrl}}">Bolesław Parasion</a>
			<script>document.getElementById("year").textContent = new Date().getFullYear();</script>
		</div>
	</footer>

	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "Artist",
		"name": "Bolesław Parasion",
		"url": "https://parasion.art",
		"image": "https://parasion.art/img/bpr.png",
		"description": "{{jsonLdDescription}}",
		"sameAs": ["{{facebook}}"]
	}
	</script>

</body>
</html>
